<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noise Detector</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    text-align:center;
    margin:0;
}

header{
    background:#2563eb;
    color:white;
    padding:30px;
}

.container{
    margin-top:30px;
}

#meter{
    width:300px;
    height:30px;
    background:#ddd;
    margin:20px auto;
    border-radius:20px;
    overflow:hidden;
}

#bar{
    height:100%;
    width:0%;
    background:green;
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.start{
    background:#22c55e;
    color:white;
}

.stop{
    background:#ef4444;
    color:white;
}

#status{
    font-size:24px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <h1>🎤 Noise Detector</h1>
    <p>Deteksi Kebisingan Real-Time</p>
</header>

<div class="container">

    <h2 id="status">Menunggu...</h2>

    <div id="meter">
        <div id="bar"></div>
    </div>

    <h3>Level Suara: <span id="value">0</span></h3>

    <button class="start" onclick="startMic()">Start</button>
    <button class="stop" onclick="stopMic()">Stop</button>

</div>

<script>

let audioContext;
let analyser;
let microphone;
let animationId;

async function startMic(){

    const stream =
        await navigator.mediaDevices.getUserMedia({audio:true});

    audioContext = new AudioContext();
    analyser = audioContext.createAnalyser();

    microphone =
        audioContext.createMediaStreamSource(stream);

    microphone.connect(analyser);

    analyser.fftSize = 256;

    const dataArray =
        new Uint8Array(analyser.frequencyBinCount);

    function update(){

        analyser.getByteFrequencyData(dataArray);

        let sum = 0;

        for(let i=0;i<dataArray.length;i++){
            sum += dataArray[i];
        }

        let volume = sum / dataArray.length;

        document.getElementById("value")
            .innerText = volume.toFixed(0);

        let percent = Math.min(volume,100);

        document.getElementById("bar")
            .style.width = percent + "%";

        if(volume < 20){
            document.getElementById("status")
                .innerText = "Tenang";
        }
        else if(volume < 50){
            document.getElementById("status")
                .innerText = "Sedang";
        }
        else{
            document.getElementById("status")
                .innerText = "Bising";
        }

        animationId =
            requestAnimationFrame(update);
    }

    update();
}

function stopMic(){

    cancelAnimationFrame(animationId);

    if(audioContext){
        audioContext.close();
    }

    document.getElementById("status")
        .innerText = "Berhenti";

    document.getElementById("bar")
        .style.width = "0%";
}

</script>

</body>
</html>
